services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: apppass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: 3002
      DATABASE_URL: mysql://app:apppass@db:3306/app
      JWT_SECRET: dev-secret
      JWT_EXPIRES_IN: 1h
    ports:
      - "3002:3002"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      API_BASE_URL: http://api:3002
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  db_data:
